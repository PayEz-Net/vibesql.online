# VibeSQL Website Deployment Pipeline
# Deploys to Azure Static Web Apps — vibesql.online

trigger:
  branches:
    include:
      - master
      - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  - group: vibesql-website-vars

steps:
- task: AzureStaticWebApp@0
  inputs:
    app_location: '/'
    output_location: 'out'
    azure_static_web_apps_api_token: $(deployment_token)
  displayName: 'Deploy vibesql.online'
