<svg xmlns="http://www.w3.org/2000/svg" width="200" height="60" viewBox="0 0 200 60" fill="none">
  <!-- VibeSQL Logo — barrel icon + wordmark -->
  <defs>
    <linearGradient id="logoBodyGrad" x1="2" y1="0" x2="38" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e3a5f" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#2563EB" stop-opacity="0"/>
      <stop offset="100%" stop-color="#1e3a5f" stop-opacity="0.3"/>
    </linearGradient>
  </defs>

  <!-- Barrel icon scaled to fit left side -->
  <g transform="translate(4, 6) scale(0.09375)">
    <ellipse cx="256" cy="400" rx="140" ry="40" fill="#1e3a5f"/>
    <rect x="116" y="160" width="280" height="240" fill="#2563EB"/>
    <rect x="116" y="160" width="280" height="240" fill="url(#logoBodyGrad)"/>
    <ellipse cx="256" cy="400" rx="140" ry="40" fill="#1e4f8a"/>
    <ellipse cx="256" cy="160" rx="140" ry="40" fill="#3b82f6"/>
    <ellipse cx="256" cy="152" rx="100" ry="22" fill="#60a5fa" opacity="0.3"/>
  </g>

  <!-- Wordmark -->
  <text x="56" y="40" font-family="Inter, -apple-system, sans-serif" font-weight="700" font-size="28">
    <tspan fill="#ffffff">Vibe</tspan><tspan fill="#3b82f6">SQL</tspan>
  </text>
</svg>